- type: entity
  parent: BaseItem
  id: BaseBitrunningDisk
  abstract: true
  name: bitrunning disk
  description: A specialized data disk for bitrunning supply systems.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Specific/Research/data_disk.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: UserInterface
    interfaces:
      enum.BitrunningDiskUiKey.Key:
        type: BitrunningDiskBoundUserInterface

- type: entity
  parent: BaseBitrunningDisk
  id: BitrunningExtensionPlayerAppearanceDisk
  name: "bitrunning extension: digital appearance"
  description: Lets your avatar load your appearance instead of the default human shell.
  components:
  - type: BitrunningProfileDisk

# TODO: Add medbeam gun from goob
- type: entity
  parent: BaseBitrunningDisk
  id: BitrunningGearSimpleDisk
  name: "bitrunning gear: simple"
  description: Use in hand to choose a one-time gear package.
  components:
  - type: BitrunningAbilityDisk
    grantMode: Item
    options:
      bitrunning-disk-option-pizza-box: FoodBoxPizza
      # bitrunning-disk-option-medical-beam-gun: MedicalBeamGun
      bitrunning-disk-option-c4: C4

