- type: entity
  parent: VendingMachine
  id: VendingMachineBitrunning
  name: Bitrunning Supplies Order
  description: A supplies order vending that exchanges bitrunning points for bitrunning goods.
  components:
  - type: VendingMachine
    pack: EmptyVendingMachineInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
  - type: Sprite
    sprite: _Orion/Structures/Machines/VendingMachines/bitrun.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4f8dcf"
  - type: ShopVendor
    pack: BitrunningVendorInventory
  - type: UserInterface
    interfaces:
      enum.VendingMachineUiKey.Key:
        type: ShopVendorBoundUserInterface
  - type: BitrunningPointsVendor
