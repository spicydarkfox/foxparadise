- type: entity
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  id: Byteforge
  name: byteforge
  description: A quantum processor that recompiles delivered cache crates into physical rewards.
  components:
  - type: Sprite
    sprite: _Orion/Structures/Machines/byteforge.rsi
    noRot: true
    layers:
    - state: byteforge
      map: ["byteforge_base"]
    - state: on_overlay
      visible: false
      map: ["byteforge_on"]
    - state: on_particles
      visible: false
      drawDepth: Effects
      map: ["byteforge_particles"]
    - state: byteforge_panel
      visible: false
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ByteforgeVisuals.ByteforgeActive:
        byteforge_on:
          True: { visible: true }
          False: { visible: false }
      enum.ByteforgeVisuals.ByteforgePowered:
        byteforge_particles:
          True: { visible: true }
          False: { visible: false }
      enum.ByteforgeVisuals.ByteforgeAngry:
        byteforge_on:
          True: { state: on_overlay_angry }
          False: { state: on_overlay }
        byteforge_particles:
          True: { state: on_particles_angry }
          False: { state: on_particles }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: true }
          False: { visible: false }
  - type: WiresPanel
  - type: Physics
    canCollide: false
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Byteforge
  - type: Machine
    board: ByteforgeMachineCircuitboard
  - type: DeviceLinkSink
    ports:
    - BitrunningByteforgeSink
  - type: AutoLinkReceiver
    channel: BitrunningHub
