- type: reagent
  id: Salbutamol
  name: reagent-name-salbutamol
  group: Medicine
  desc: reagent-desc-salbutamol
  physicalDesc: reagent-physical-desc-odorless
  flavor: medicine
  color: "#7EC8E3"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Asphyxiation: -0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Salbutamol
          min: 15
        damage:
          types:
            Asphyxiation: 5

- type: reagent
