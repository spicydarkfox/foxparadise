- type: reagent
  id: Ibuprofen
  name: reagent-name-ibuprofen
  group: Medicine
  desc: reagent-desc-ibuprofen
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: medicine
  color: "#c44c37"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.1
      effects:
      - !type:EvenHealthChange
        damage:
          Brute: -0.5
      - !type:HealthChange
