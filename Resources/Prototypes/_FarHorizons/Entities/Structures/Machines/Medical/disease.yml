- type: entity
  id: DiseasePandemic2300
  parent: [ Vaccinator, SmallConstructibleMachine ]
  name: PanD.E.M.I.C. 2300
  description: A machine that creates vaccines.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: Structures/Machines/vaccinator.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: ContainerContainer
    containers:
      machine_board: !type:Container {}
      machine_parts: !type:Container {}
      sample: !type:ContainerSlot {}
  - type: Lathe
    idleState: icon
    runningState: running
    unlitIdleState: unlit
    unlitRunningState: running
    staticPacks:
    - VaccinatorRecipePack
  - type: DiseaseVaccinator
  - type: MaterialStorage
  - type: ItemSlots
    slots:
      sample:
        whitelist:
          tags:
            - CentrifugeCompatible
  - type: ActivatableUI
    key: enum.VaccinatorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.VaccinatorUiKey.Key:
        type: VaccinatorBoundUserInterface

- type: entity
  id: DiseaseDiagnoser2300
  parent: DiseaseDiagnoser
  name: Disease Diagnoser Delta Extreme 2300
  description: A machine that analyzes disease samples.
  placement:
    mode: SnapgridCenter
  components:
  - type: DiseaseDiagnoser
  - type: ContainerContainer
    containers:
      machine_board: !type:Container {}
      machine_parts: !type:Container {}
      sample: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      sample:
        whitelist:
          tags:
            - CentrifugeCompatible
