- type: diseaseSymptom
  id: SymptomJitters
  name: disease-symptom-SymptomJitters-name
  probability: 0.1
  onlyAlive: true
  behaviors:
  - !type:SymptomStatusEffect
    effects:
    - !type:Jitter
      amplitude: 2
      frequency: 6
      time: 3

- type: diseaseSymptom
  id: SymptomTransitionToFlu
  name: disease-symptom-SymptomTransitionToFlu-name
  probability: 0.005
  onlyAlive: true
  behaviors:
  - !type:SymptomStatusEffect
    effects:
    - !type:TransitionDisease
      fromDiseaseId: DiseaseCold
      toDiseaseId: DiseaseFlu

- type: diseaseSymptom
  id: SymptomVomiting
  name: disease-symptom-SymptomVomiting-name
  probability: 0.05
  onlyAlive: true
  cureDuration: 120
  cureSteps:
  - !type:CureConditions
    conditions:
    - !type:ReagentCondition
      reagent: Charcoal
      min: 5
  behaviors:
  - !type:SymptomStatusEffect
    effects:
    - !type:Vomit

- type: diseaseSymptom
  id: SymptomNarcolepsy
  name: disease-symptom-SymptomNarcolepsy-name
  onlyAlive: true
  cureDuration: 400
  cureSteps:
  - !type:CureConditions
    conditions:
    - !type:ReagentCondition
      reagent: Ethyloxyephedrine
      min: 5
  - !type:CureConditions
    conditions:
    - !type:ReagentCondition
      reagent: Diphenylmethylamine
      min: 3
  behaviors:
  - !type:SymptomGenericStatusEffect
    effectProto: StatusEffectForcedSleeping
    time: 6

- type: diseaseSymptom
  id: SymptomFever
  name: disease-symptom-SymptomFever-name
  probability: 1.0
  onlyAlive: true
  cureDuration: 180
  cureSteps:
  - !type:CureConditions
    conditions:
    - !type:ReagentCondition
      reagent: Haloperidol
      min: 2
    - !type:ReagentCondition
      reagent: Synaptizine
      min: 2
  behaviors:
  - !type:SymptomStatusEffect
    effects:
    - !type:AdjustTemperature
      conditions:
      - !type:TemperatureCondition
          max: 314.15
      amount: 10000
    - !type:HealthChange
      damage:
        types:
          Heat: 0.1

