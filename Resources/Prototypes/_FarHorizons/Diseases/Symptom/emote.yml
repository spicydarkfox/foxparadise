- type: diseaseSymptom
  id: SymptomCough
  name: disease-symptom-SymptomCough-name
  onlyAlive: true
  airborneBurst:
    rangeMultiplier: 1.75
    chanceMultiplier: 1.5
  cureDuration: 120
  cureSteps:
  - !type:CureConditions
    conditions:
    - !type:ReagentCondition
      reagent: Salbutamol
      min: 5
  behaviors:
  - !type:SymptomStatusEffect
    effects:
    - !type:Emote
      emote: Cough
      showInChat: true

