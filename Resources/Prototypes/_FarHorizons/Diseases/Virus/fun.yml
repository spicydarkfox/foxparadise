- type: disease
  id: DiseaseGBS
  name: disease-DiseaseGBS-name
  desc: disease-DiseaseGBS-desc
  spreadPath: [ NonContagious ]
  cureSteps:
  - !type:CureConditions
    cureChance: 0.15 # Higher chance to cure, since two reagents are required.
    conditions:
    - !type:ReagentCondition
      reagent: Diphenhydramine
      min: 1
    - !type:ReagentCondition
      reagent: Sulfur
      min: 1
  - !type:CureWait
    requiredTicks: 900
  - !type:CureBedrest
      bedrestChance: 0.00066 #Abysmally Low to have an average of 300 ticks before a heal if they sleep
      sleepMultiplier: 5
  stages:
  - stage: 0
    stealth: [ Hidden, VeryHidden ]
  - stage: 1
    symptoms:
    - symptom: SymptomSneeze
  - stage: 2
    sensations: [ "disease-sensation-very-weak" ]
    symptoms:
    - symptom: SymptomCough
      probability: 0.05
    - symptom: SymptomGasp
      probability: 0.05
  - stage: 3
    symptoms:
    - symptom: SymptomCough
      probability: 0.1
  - stage: 4
    sensations: [ "disease-sensation-gib-itself" ]
    symptoms:
    - symptom: SymptomCough
      probability: 0.05
    - symptom: SymptomGib

- type: disease
