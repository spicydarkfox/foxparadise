  contactDeposit: 0.05
  cureSteps:
  - !type:CureConditions
    conditions:
    - !type:ReagentCondition
      reagent: JuiceBanana
      min: 3
  - !type:CureWait
    requiredTicks: 900
  - !type:CureBedrest
      bedrestChance: 0.00066 #Abysmally Low to have an average of 300 ticks before a heal if they sleep
