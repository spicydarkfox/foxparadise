# Headgear other than armor
- type: entity
  parent: [ClothingHeadHardsuitBase]
  id: ClothingHeadHelmetHardsuitAISTacsuit
  name: AIS tacsuit helmet
  suffix: AIS
  description: A modern helmet used with the standard AIS tacsuit
  components:
    - type: Sprite
      sprite: _EE/Clothing/BieselRepublic/Helmet/TCFL_tacsuit_helmet.rsi
    - type: Clothing
      sprite: _EE/Clothing/BieselRepublic/Helmet/TCFL_tacsuit_helmet.rsi
      clothingVisuals:
        head:
        - state: equipped-HELMET
        - state: equipped-HELMET-unshaded
          shader: unshaded
    - type: PressureProtection
      highPressureMultiplier: 0.08
      lowPressureMultiplier: 1000
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.9
          Slash: 0.9
          Piercing: 0.9
          Heat: 0.9

- type: entity
  parent: [ClothingHeadHelmetBasic]
  id: ClothingHeadHelmetAISHeavy
  name: AIS heavy tactical helmet
  suffix: AIS
  description: Much of the equipment used by the AIS is repurposed from older Solarian wargear. This advanced helmet includes a ballistic polymer face shield.
  components:
    - type: Sprite
      sprite: _EE/Clothing/BieselRepublic/Helmet/TCAF_tactical_helmet_full.rsi
    - type: Clothing
      sprite: _EE/Clothing/BieselRepublic/Helmet/TCAF_tactical_helmet_full.rsi
      clothingVisuals:
        head:
        - state: equipped-HELMET
        - state: equipped-HELMET-unshaded
          shader: unshaded
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.9
          Slash: 0.9
          Piercing: 0.8
          Heat: 0.8
    - type: Reflect
      reflectProb: 0.05
      spread: 270
      reflects:
        - Energy
        - NonEnergy

