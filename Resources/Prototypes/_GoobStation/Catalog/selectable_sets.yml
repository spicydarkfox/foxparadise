# Blueshield officer

- type: selectableSet
  id: BSOBlueshieldSet
  name: selectable-set-blueshield-shield-name
  description: selectable-set-blueshield-shield-description
  sprite:
    sprite: _GoobStation/Objects/Shields/blueshieldshield.rsi
    state: icon-on
  content:
    - BlueShieldShieldFilled

- type: selectableSet
  id: BSORevolverSet
  name: selectable-set-blueshield-revolver-name
  description: selectable-set-blueshield-revolver-description
  sprite:
    sprite: _LP/Objects/Weapons/Guns/Battery/blueshield_laser.rsi # LP Edit
    state: icon
  content:
    - LPPBlueshieldRevolver

- type: selectableSet
  id: BSOChesterSet
  name: selectable-set-blueshield-chester-name
  description: selectable-set-blueshield-chester-description
  sprite:
    sprite: _GoobStation/Objects/Weapons/Guns/Lever/chester.rsi
    state: base
  content:
  # Guaranteed items
  - WeaponLeverChester
  - MagazineShotgunLeverRifleEmpty
  - MagazineShotgunLeverRifleEmpty
  - MagazineShotgunLeverRifle
  - MagazineShotgunLeverRifle
#  tables:
#  - ChesterRandomAmmoTable
