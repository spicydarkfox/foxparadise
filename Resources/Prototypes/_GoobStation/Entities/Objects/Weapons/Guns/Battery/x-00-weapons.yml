- type: entity
  name: X-8 "DMR"
  parent: [BaseWeaponBattery, BaseGunWieldable, BaseGrandTheftContraband]
  id: WeaponHeadOfSecurityRifle
  description: An elaborately designed rifle, firing shots of pure phoron. Low fire rate, high damage.
  components:
  - type: Sprite
    sprite: _GoobStation/Objects/Weapons/Guns/Battery/HeadOfSecurity/rifle.rsi
    state: icon
  - type: Clothing
    sprite: _GoobStation/Objects/Weapons/Guns/Battery/HeadOfSecurity/rifle.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    shape:
    - 0,0,4,1
  - type: Gun
    fireRate: 2
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_perforator.ogg
    defaultDirection: 1, 0
  - type: BatteryAmmoProvider
    proto: RedMediumSplitLaser
    fireCost: 80
  - type: StaticPrice
    price: 2500
  # starlight start
  - type: ContainerContainer
    containers:
      firing_pin: !type:Container
  - type: ContainerFill
    containers:
      firing_pin:
      - FiringPinAdvancedLaser
  - type: FiringPinHolder
    supportedPins: [ AdvancedLaser ]
  # starlight end
  - type: StealTarget
    stealGroup: WeaponEnergyMagnum
  - type: BatterySelfRecharger
    autoRechargeRate: 20 #LP edit чутка снижена самозарядка взамен на снижение в 2 раза цены
    autoRechargePauseTime: 5 #LP edit

