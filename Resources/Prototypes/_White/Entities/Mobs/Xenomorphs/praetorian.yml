- type: entity
  parent: BaseMobXenomorphAdult
  id: BaseMobXenomorphPraetorian
  name: xenomorph praetorian
  description: An elite specimen designed to protect the Hive and the Queen, his very presence instills fear and trepidation into the enemy ranks.
  abstract: true
  components:
  - type: Sprite
    sprite: _White/Mobs/Aliens/Xenomorphs/praetorian.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: xenomorph
      offset: 0, 0.6
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
  - type: Body
  - type: TypingIndicator
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        density: 300
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      360: Critical
      375: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      225: 0.9
      270: 0.7
      315: 0.6
  - type: MeleeWeapon
    damage:
      types:
        Slash: 10
        Piercing: 10
        Blunt: 10

- type: entity
  parent: [BaseMobXenomorphDungeon, BaseMobXenomorphPraetorian]
  id: MobXenomorphPraetorianDungeon
  components:
  - type: MovementSpeedModifier
    baseSprintSpeed: 3.8
  - type: SlowOnDamage
    speedModifierThresholds:
      225: 0.7
      270: 0.6
      315: 0.5
