            prototype: LPPLargeRocketCircuitboard
            amount: 1
          - !type:SpawnPrototype
            prototype: SheetPlasma1
            amount: 5
          - !type:SpawnPrototype
            prototype: PartRodMetal1
            amount: 2
          conditions:
          - !type:EntityAnchored
          steps:
          - tool: Screwing
            doAfter: 3
          - tool: Cutting
            doAfter: 1


