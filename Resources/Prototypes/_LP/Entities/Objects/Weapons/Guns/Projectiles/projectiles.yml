- type: entity
  name: phosphorus ball
  id: LPPBulletPhosphorus
  categories: [ HideSpawnMenu ]
  components:
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: EmbeddableProjectile
    deleteOnRemove: true
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        mask:
          - BulletImpassable
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Projectiles/energybolts.rsi
    state: flare
  - type: IgnitionSource
    ignited: true
    temperature: 1000
  - type: TimedDespawn
    lifetime: 10
  - type: PointLight
    enabled: true
    color: "#39ff2b"
    radius: 3.0
    energy: 2.0
  - type: Projectile
    deleteOnCollide: false
    ignoreResistances: true
    damage:
      types:
        Heat: 15
