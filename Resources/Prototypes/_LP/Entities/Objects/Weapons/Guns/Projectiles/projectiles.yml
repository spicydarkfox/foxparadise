- type: entity
  name: galvanic bolt
  id: LPPBulletLaserHeavy
  categories: [ HideSpawnMenu ]
  parent: BulletLaser
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Projectiles/energybolts.rsi
    layers:
    - state: lightgold
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#c1c734"
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Caustic: 30

- type: entity
