# === ОРУЖИЕ С САМОЗАРЯДКОЙ ===
# Станбатон с самозарядкой
- type: entity
  id: LPPStunbatonBorgSec
  parent: Stunbaton
  suffix: Cyborg, Security
  components:
  - type: BatterySelfRecharger
    # autoRecharge: true
    autoRechargeRate: 30

# Тайзер с самозарядкой
- type: entity
  id: LPPWeaponDisablerBorgSec
  parent: WeaponDisabler
  suffix: Cyborg, Security
  components:
  - type: BatterySelfRecharger
    # autoRecharge: true
    autoRechargeRate: 30

# Лазерный карабин с самозарядкой
- type: entity
  id: LPPWeaponLaserCarbineBorgSec
  parent: WeaponLaserCarbine
  suffix: Cyborg, Security
  components:
  - type: BatterySelfRecharger
    # autoRecharge: true
    autoRechargeRate: 30 # ~0.5 выстрелов в секунду или ~32 секунды на полную зарядку.

- type: entity
  name: blueshield revolver
  parent: [BaseWeaponBatterySmall, BaseCentcommContraband]
  id: LPPBlueshieldRevolver
  description: Stylish and tasteful.
  components:
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Battery/blueshield_laser.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _LP/Objects/Weapons/Guns/Battery/blueshield_laser.rsi
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: BatteryAmmoProvider
    proto: LPPPulse
    fireCost: 250
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Battery
    maxCharge: 4250
    startingCharge: 4250
  - type: ContainerContainer
    containers:
      firing_pin: !type:Container
  - type: ContainerFill
    containers:
      firing_pin:
      - FiringPinAdvancedLaser
  - type: FiringPinHolder
    supportedPins: [ AdvancedLaser ]

- type: entity
  name: Dominator energy pistol
  parent: [BaseWeaponBatterySmall, BaseSecurityContraband]
  id: LPPWeaponEnergyGunPistolDominator
  description: Dream gun of any security officer. It's like a swiss knife of energy weapons.
  components:
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Battery/dominator.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _DV/Objects/Weapons/Guns/Battery/mini_energygun.rsi
  - type: Gun
    fireRate: 1.5
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/laser.ogg
    soundEmpty:
      path: /Audio/_DV/Weapons/Guns/Empty/dry_fire.ogg
  - type: Battery
    maxCharge: 1900
    startingCharge: 1900
  - type: BatteryAmmoProvider
    proto: BulletDetain
    fireCost: 100
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: BulletDetain
      fireCost: 100
    - proto: BulletEnergyGunLaser
      fireCost: 100
    - proto: BulletBigshot
      fireCost: 150
    - proto: BulletHotshot
      fireCost: 250
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Tag
    tags:
    - Sidearm
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: OfficerHandgun
  - type: ContainerContainer
    containers:
      firing_pin: !type:Container
  - type: ContainerFill
    containers:
      firing_pin:
      - FiringPinLaser
  - type: FiringPinHolder
    supportedPins: [ Laser ]

- type: entity
  name: Galvanic rifle
  parent: [BaseWeaponPowerCell, BaseGunWieldable, BaseCentcommContraband ]
  id: LPPWeaponGalvanicrifle
  description: Weapon of Skitarii units- galvanic rifle. Energy weapon with detachable powercell that loved by all regiments. Mostly used for scouting and mid range combats.
  components:
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Battery/galvanic/big.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
        scale: "0.7,1.0"
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
        scale: "0.7,1.0"
  - type: Item
    size: Large
    sprite: _LP/Objects/Weapons/Guns/Battery/galvanic/tiny.rsi
    shape:
    - 0,0,5,0
  - type: Appearance
  - type: Clothing
    sprite: _LP/Objects/Weapons/Guns/Battery/galvanic/tiny.rsi
    quickEquip: true
    slots:
      - Back
      - suitStorage
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Wieldable
    unwieldOnUse: true
  - type: GunRequiresWield
  - type: SpeedModifiedOnWield
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: Gun
    projectileSpeed: 55
    angleIncrease: 5
    angleDecay: 45
    fireRate: 2.5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/EG-R/shot.ogg
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        startingItem: LPPPowerCellGalvanicRifle
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - LPPGalvainc
  - type: Tag
    tags:
    - LaserWeapon
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: BatteryAmmoProvider
    proto: LPPBulletLaserHeavy
    fireCost: 50

- type: entity
  name: Radium rifle
  parent: [BaseWeaponBatterySmall, BaseGunWieldable, BaseCentcommContraband]
  id: LPPWeaponRadiumrifle
  description: Burst fire radium rifle is a part of radium weapon family. Most of the fame of this weapon comes from it's lethality to the user because of the radium core that sometimes leaks some of the radiation.
  components:
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Battery/radiumrifle/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
      scale: "0.75,0.75"
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
      scale: "0.75,0.75"
  - type: Clothing
    sprite: _LP/Objects/Weapons/Guns/Battery/radiumrifle/tiny.rsi
    quickEquip: true
    slots:
      - Back
      - suitStorage
  - type: Item
    size: Large
    sprite: _LP/Objects/Weapons/Guns/Battery/radiumrifle/tiny.rsi
    shape:
    - 0,0,3,1
  - type: Wieldable
    unwieldOnUse: true
  - type: GunRequiresWield
  - type: Gun
    fireRate: 15.0
    selectedMode: Burst
    availableModes:
    - Burst
    shotsPerBurst: 4
    burstCooldown: 1
    soundGunshot:
      path: /Audio/_Impstation/Weapons/Guns/Gunshots/stunprojector.ogg
  - type: BatteryAmmoProvider
    proto: LPPBulletLaserRadiation
    fireCost: 100
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Battery
    maxCharge: 1600
    startingCharge: 1600
  - type: ContainerContainer
    containers:
      firing_pin: !type:Container
  - type: ContainerFill
    containers:
      firing_pin:
      - FiringPinAdvancedLaser
  - type: FiringPinHolder
    supportedPins: [ AdvancedLaser ]
  - type: BatterySelfRecharger
    autoRechargeRate: 40
    autoRechargePauseTime: 5

