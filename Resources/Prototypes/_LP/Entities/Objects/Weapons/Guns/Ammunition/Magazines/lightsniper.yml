- type: entity
  abstract: true
  parent: [ BaseItem, BaseSecurityContraband ]
  id: LPPBaseMagazineLightSniper
  name: "magazine (.30 rifle )"
  components:
  - type: Tag
    tags:
      - LPPMagazineLightSniper
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeLightRifle
    capacity: 13
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Ammunition/Magazine/lightsniper_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: LPPBaseMagazineLightSniper
  id: LPPMagazineLightSniper
  name: "magazine (.30 rifle)"
  description: 13-round double stack magazine for sniper rifles. Intended to hold medium presure kinetic ammunition.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifle
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Small
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
