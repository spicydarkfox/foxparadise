- type: entity
  id: LPPLargeGyroscopeConstruction
  parent: BaseStructureDynamic
  name: large gyroscope construction
  placement:
    mode: AlignTileAny
  components:
  - type: Appearance
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-1.45,1.45,0.45"
        density: 1750
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    offset: 0.5,-0.5
    sprite: _LP/Structures/Machines/large_gyroscope.rsi
    layers:
    - map: [ "enum.ConstructionVisuals.Layer" ]
      state: frame_0
  - type: GenericVisualizer
    visuals:
      enum.ConstructionVisuals.Key:
        enum.ConstructionVisuals.Layer:
          missingWires: { state: frame_0 }
          machineFrame: { state: frame_1 }
          circuitInserted: { state: frame_2 }
          circuitFixed: { state: frame_3 }
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 5
  - type: Construction
    graph: LargeGyroscope
    node: missingWires
  - type: ContainerContainer
    containers:
      board: !type:Container
