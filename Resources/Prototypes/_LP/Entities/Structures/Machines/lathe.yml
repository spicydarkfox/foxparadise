- type: entity
  id: LPPServiceProtolathe
  parent: [BaseLatheLube, BaseSiloUtilizer]
  name: service protolathe
  description: Prints equipment and circuitboards for use by service department.
  components:
  - type: Sprite
    sprite: _LP/Structures/Machines/serv_protolathe.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: LPPServiceProtolatheMachineCircuitboard
  - type: Lathe
    idleState: icon
    runningState: building
    staticPacks:
    - ChemistryStatic
    - SurgeryStatic
    - ServiceBoardsStatic
    dynamicPacks:
    - LPPServiceClothing
    - CameraBoards
    - ServiceBoards
    - PowerCells
    - AtmosTools
    - Janitor
    - Instruments
    - Equipment
  - type: MaterialStorage
    whitelist: &StandardMaterialWhitelist
      tags:
        - Sheet
        - RawMaterial
        - Ingot
  - type: BlueprintReceiver
    whitelist:
      tags:
      - BlueprintProtolathe
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      blueprint: !type:Container
  - type: EmptyOnMachineDeconstruct
    containers:
    - blueprint

