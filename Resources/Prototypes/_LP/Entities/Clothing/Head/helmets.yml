- type: entity
  parent: ClothingHeadBase
  id: LPPClothingHeadHelmetHeavy
  name: Heavy armor helmet
  description: A sturdy helmet made of kevlar and plasteel, will protect against small-caliber bullets, as well as shrapnel.
  components:
  - type: Sprite
    sprite: _LP/Clothing/Head/Helmets/heavy.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
      visible: false
    - state: icon-open
      visible: true
      map: ["foldedLayer"]
  - type: Clothing
    sprite: _LP/Clothing/Head/Helmets/heavy.rsi
    equippedPrefix: open
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
  - type: Foldable
    folded: true
    canFoldInsideContainer: true
    unfoldVerbText: fold-zip-verb
    foldVerbText: fold-unzip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: open
    foldedHeldPrefix: open
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: PressureProtection
    lowPressureMultiplier: 100
  - type: BreathMask
  - type: Item
    heldPrefix: open

