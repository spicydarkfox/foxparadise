# Cells compatible with the Starflare EPDW-6.
- type: entity
  name: Starflare EPDW-6 cell
  description: A rechargeable power cell compatible with the Starflare EPDW-6. Sadly its proprietary formfactor is not compatible elsewhere.
  id: PowerCellStarflare
  suffix: Full
  parent: [ BasePowerCell, BaseSecurityContraband ]
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Ammunition/Magazine/Blasters/starflaremag.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: o2
        map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        shader: unshaded
  - type: Explosive
    explosionType: Default
    maxIntensity: 250
    intensitySlope: 1.5
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 8
  - type: Extractable
    juiceSolution:
      reagents:
        - ReagentId: Zinc
          Quantity: 8
  - type: Appearance
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Riggable
  - type: Item
    size: Small
    storedRotation: 90
    shape:
    - 0,0,0,2
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatteryAmmoProvider
    proto: BulletLaserHeavy
    fireCost: 40 #25 shots
  - type: Tag
    tags:
      - StarflareCell
  - type: PowerCell

- type: entity
  id: PowerCellStarflarePrinted
  suffix: Empty
  parent: PowerCellStarflare
  components:
  - type: Battery
    maxCharge: 900
    startingCharge: 0
