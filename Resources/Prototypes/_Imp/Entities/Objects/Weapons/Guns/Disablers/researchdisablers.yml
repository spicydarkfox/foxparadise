# disablers unlocked by researching technology.
- type: entity
  name: disabler carbine
  parent: [WeaponDisabler, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponDisablerCarbine
  description: An advanced disabler that accelerates its shots to the speed of light.
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,4,0
    - 0,1,0,2
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Disablers/disablercarbine.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _Impstation/Objects/Weapons/Guns/Disablers/disablercarbine.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Impstation/Weapons/Guns/Gunshots/stunprojector.ogg
    fireRate: 1.6
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: BatteryAmmoProvider
    proto: HitscanDisabler
    fireCost: 100
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: StaticPrice
    price: 420

- type: entity
  name: disabler shotgun
  parent: [WeaponDisabler, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponDisablerShotgun
  description: An advanced disabler that shots in shotgun pattern.
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,3,0
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Disablers/disablershotgun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _Impstation/Objects/Weapons/Guns/Disablers/disablercarbine.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Impstation/Weapons/Guns/Gunshots/eshotgun.ogg
    fireRate: 1.6
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: BatteryAmmoProvider
    proto: BulletDisablerSmgSpread
    fireCost: 100
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
