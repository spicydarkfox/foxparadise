- type: entity
  parent: CrateSyndicate
  id: ClothingBackpackDuffelSyndicateControllerBundle
  name: syndicate hardsuit bundle
  description: "Contains the Syndicate's signature blood red hardsuit."
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClothingModularControllerSyndicatePreassembled
        - !type:NestedSelector
          tableId: SyndicateHardsuitExtrasEntityTable

- type: entity
  parent: ClothingBackpackDuffelSyndicateBundle
  id: ClothingBackpackDuffelEnergyShieldModuleBundle
  name: energy shield module bundle
  description: Contains five energy shield modules. Allows equipping an entire team with personal protective forcefields.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: EnergyShieldSuitModule
          amount: 5
