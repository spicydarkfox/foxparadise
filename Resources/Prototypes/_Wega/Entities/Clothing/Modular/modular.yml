# Standard
- type: entity
  parent: ClothingModularControllerBase
  id: ClothingModularControllerStandard
  name: standard modsuit controller
  description: A standard controller for modular suits from Nakamura Engineering. Manages power distribution and module integration.
  components:
  - type: Sprite
    sprite: _Wega/Clothing/Modular/Standard/control.rsi
  - type: Clothing
    sprite: _Wega/Clothing/Modular/Standard/control.rsi
  - type: ContainerFill
    containers:
      suit_core: &core-slot #<-- &
        - ModularSuitCoreStandard
      suit_part:
        - ClothingModularHelmetStandard
        - ClothingModularChestPlateStandard
        - ClothingModularGauntletsStandard
        - ClothingModularBootsStandard

- type: entity
  parent: ClothingModularHelmetBase
  id: ClothingModularHelmetStandard
  name: standard modsuit helmet
  description: A sealed helmet with basic protection. Features a retractable visor with cyan lighting.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Clothing/Modular/Standard/helmet.rsi
  - type: Clothing
    sprite: _Wega/Clothing/Modular/Standard/helmet.rsi
  - type: ModularSuitPart
    verbIcon:
      sprite: _Wega/Clothing/Modular/Standard/helmet.rsi
      state: icon-sealed
  - type: ToggleableVisuals
    clothingVisuals:
      head:
      - state: sealed-equipped-HELMET
      - state: visor-unshaded
        shader: unshaded
        color: "#79f8e6"
      head-reptilian:
      - state: sealed-equipped-HELMET-reptilian
      - state: visor-unshaded-reptilian
        shader: unshaded
        color: "#79f8e6"
      head-vox:
      - state: sealed-equipped-HELMET-vox
      - state: visor-unshaded-vox
        shader: unshaded
        color: "#79f8e6"
  - type: PointLight
    color: "#79f8e6"

- type: entity
  parent: ClothingModularChestPlateBase
  id: ClothingModularChestPlateStandard
  name: standard modsuit chestplate
  description: A basic armor plate for modular suits. Provides standard protection and serves as the main mounting point for modules.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Clothing/Modular/Standard/chestplate.rsi
  - type: Clothing
    sprite: _Wega/Clothing/Modular/Standard/chestplate.rsi
  - type: ModularSuitPart
    verbIcon:
      sprite: _Wega/Clothing/Modular/Standard/chestplate.rsi
      state: icon-sealed

- type: entity
  parent: ClothingModularGauntletsBase
  id: ClothingModularGauntletsStandard
  name: standard modsuit gauntlets
  description: Reinforced gauntlets with integrated servo systems. Allow installation of hand-related modules.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Clothing/Modular/Standard/gauntlets.rsi
  - type: Clothing
    sprite: _Wega/Clothing/Modular/Standard/gauntlets.rsi
  - type: ModularSuitPart
    verbIcon:
      sprite: _Wega/Clothing/Modular/Standard/gauntlets.rsi
      state: icon-sealed

- type: entity
  parent: ClothingModularBootsBase
  id: ClothingModularBootsStandard
  name: standard modsuit boots
  description: Sealed boots with magnetic anchoring systems. Serve as the foundation for mobility-related modules.
