# Advanced
- type: entity
  parent: ClothingModularControllerBase
  id: ClothingModularControllerAdvanced
  name: advanced modsuit controller
  description: An upgraded controller with enhanced thermal regulation. Belongs to the Chief Engineer.
  components:
  - type: Sprite
    sprite: _Wega/Clothing/Modular/Advanced/control.rsi
  - type: Clothing
    sprite: _Wega/Clothing/Modular/Advanced/control.rsi
  - type: ContainerFill
    containers:
      suit_core: &core-slot-plasma #<-- &
        - ModularSuitCorePlasma
      suit_part:
        - ClothingModularHelmetAdvanced
        - ClothingModularChestPlateAdvanced
        - ClothingModularGauntletsAdvanced
        - ClothingModularBootsAdvanced
  - type: ModularSuit
    activeComponents:
      head:
        - type: PressureProtection
          highPressureMultiplier: 0.08
          lowPressureMultiplier: 1000
        - type: TemperatureProtection
          heatingCoefficient: 0.1
          coolingCoefficient: 0.1
        - type: FireProtection
          reduction: 0.2
      outerClothing:
        - type: PressureProtection
          highPressureMultiplier: 0.02
          lowPressureMultiplier: 1000
        - type: TemperatureProtection
          heatingCoefficient: 0.01
          coolingCoefficient: 0.01
        - type: FireProtection
          reduction: 0.8

