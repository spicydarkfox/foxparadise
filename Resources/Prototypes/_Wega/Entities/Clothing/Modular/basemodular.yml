- type: entity
  parent: [ BaseItem, BaseClothingModularToggler ]
  id: ClothingModularGauntletsBase
  abstract: true
  components:
  - type: Item
    size: Small
    storedRotation: -90
  - type: Clothing
    quickEquip: false
    slots: [ gloves ]
    clothingVisuals:
      gloves:
      - state: equipped-HAND
  - type: ToggleableVisuals
    clothingVisuals:
      gloves:
      - state: sealed-equipped-HAND
  - type: ModularSuitPart
    partType: Gloves
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 10
  - type: Tag
    tags:
    - WhitelistChameleon

- type: entity
  parent: [ BaseItem, BaseClothingModularToggler ]
  id: ClothingModularBootsBase
  abstract: true
  components:
  - type: Item
    size: Normal
  - type: Clothing
    quickEquip: false
    slots: [ feet ]
    clothingVisuals:
      shoes:
      - state: equipped-FEET
