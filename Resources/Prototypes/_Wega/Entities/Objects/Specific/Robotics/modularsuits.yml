# Construction
- type: entity
  id: ModularSuitConstruction
  name: modular construction
  description: "A partially assembled modular suit frame. Requires a core, armor parts, plating, and a power cell to complete."
  components:
  - type: Animateable
  - type: Clickable
  - type: InteractionOutline
  - type: MovedByPressure
  - type: Pullable
  - type: DamageExaminable
  - type: Appearance
  - type: ModularSuitAssemblyVisuals
    statePrefix: mod
  - type: Sprite
    sprite: &mod-rsi _Wega/Objects/Specific/Robotics/modular_suits.rsi
    drawdepth: Items
    noRot: true
    state: mod0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3  # fite me
        friction: 0.2
  - type: EmitSoundOnCollide
    sound:
      collection: WeakHit
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Effects/drop.ogg
      params:
        volume: 2
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: MetalThud
  - type: CollisionWake
  - type: GravityAffected
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Construction
    graph: ModularSuit
    node: start
    defaultTarget: mod

- type: entity
  parent: ModularSuitConstruction
  id: ModularSuitConstructionFinished
  name: modular construction
  description: "A fully assembled modular suit frame. Ready for plating installation and power cell insertion."
  components:
  - type: Sprite
    state: mod8
  - type: Construction
    deconstructionTarget: null
    graph: ModularSuitVariants
    node: base_suit

# Cores
- type: entity
  parent: BaseItem
  id: BaseModularSuitCore
  abstract: true
  components:
  - type: Item
    size: Small
    storedRotation: -90
  - type: Sprite
    sprite: *mod-rsi

- type: entity
  parent: BaseModularSuitCore
  id: ModularSuitCoreStandard
  name: modular suit core
  description: "Nakamura Engineering's standard suit core. Provides baseline power distribution for modular suits."
  components:
  - type: Sprite
    state: mod-core-standard
  - type: ModularSuitCore
    verbIcon:
      sprite: *mod-rsi
      state: mod-core-standard
  - type: Tag
    tags:
    - ModularSuitCore

- type: entity
  parent: BaseModularSuitCore
  id: ModularSuitCorePlasma
  name: modular suit plasma core
  description: "An advanced plasma-fueled core. Offers twice the capacity of standard models, perfect for extended operations."
  components:
  - type: Sprite
    state: mod-core-plasma
  - type: ModularSuitCore
    multiplier: 0.5
    maxCharge: 200
    charge: 200
    verbIcon:
      sprite: *mod-rsi
      state: mod-core-plasma

- type: entity
  parent: BaseModularSuitCore
  id: ModularSuitCoreInfinite
  name: modular suit infinite core
  description: "An experimental core with an unlimited power source. Where did you even get this?"
  components:
  - type: Sprite
    state: mod-core-infinite
  - type: ModularSuitCore
    infinite: true
    verbIcon:
      sprite: *mod-rsi
      state: mod-core-infinite

# Parts
- type: entity
  parent: BaseItem
  id: ModularSuitHelmet
  name: modular suit helmet
  description: "A sealed helmet for modular suits. Provides head protection and houses visor module interfaces."
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: *mod-rsi
    state: helmet
  - type: ModularSuitPart
    partType: Helmet
    verbIcon:
      sprite: *mod-rsi
      state: helmet
  - type: Tag
    tags:
    - ModularSuitHelmet

- type: entity
  parent: BaseItem
  id: ModularSuitChestPlate
  name: modular suit chestplate
  description: "The primary armor plate for modular suits. Protects the torso and serves as the mounting point for most modules."
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: *mod-rsi
    state: chestplate
  - type: ModularSuitPart
    partType: Torso
    verbIcon:
      sprite: *mod-rsi
      state: chestplate
  - type: Tag
    tags:
    - ModularSuitChestPlate

- type: entity
  parent: BaseItem
  id: ModularSuitGauntlets
  name: modular suit gauntlets
  description: "Reinforced gauntlets with integrated servo systems. Allow installation of hand-related modules."
  components:
  - type: Item
    size: Small
    storedRotation: -90
  - type: Sprite
    sprite: *mod-rsi
    state: gauntlets
  - type: ModularSuitPart
    partType: Gloves
    verbIcon:
      sprite: *mod-rsi
      state: gauntlets
  - type: Tag
    tags:
    - ModularSuitGauntlets

- type: entity
  parent: BaseItem
  id: ModularSuitBoots
  name: modular suit boots
  description: "Sealed boots with magnetic anchoring systems. Serve as the foundation for mobility-related modules."
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: *mod-rsi
    state: boots
  - type: ModularSuitPart
    partType: Boots
    verbIcon:
      sprite: *mod-rsi
      state: boots
  - type: Tag
    tags:
    - ModularSuitBoots

# Platings
