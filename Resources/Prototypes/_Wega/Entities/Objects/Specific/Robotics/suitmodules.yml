- type: entity
  parent: BaseItem
  id: BaseSuitModule
  abstract: true
  components:
  - type: Sprite
    sprite: &modules-rsi _Wega/Objects/Specific/Robotics/modules.rsi
  - type: ModularSuitModule

# Storage
- type: entity
  parent: BaseSuitModule
  id: BaseStorageSuitModule
  abstract: true
  components:
  - type: Item
    size: Huge
  - type: ModularSuitStorageModule
  - type: ModularSuitModule
    tags: [ StorageSuitModule ]
    canBeDisabled: false
    active: true
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: [ ]
  - type: Storage
    showVerb: false
    clickInsert: false
    openOnActivate: false
    maxItemSize: Huge
    grid:
    - 0,0,6,3
  - type: ExplosionResistance
    damageCoefficient: 1
  - type: Tag
    tags:
    - StorageSuitModule

- type: entity
  parent: BaseStorageSuitModule
  id: StorageSuitModule
  name: storage suit module
  description: "What amounts to a series of integrated storage compartments and specialized pockets installed across the surface of the suit, useful for storing various bits, and or bobs."
  components:
  - type: Sprite
    state: storage
  - type: ModularSuitModule
    verbIcon:
      sprite: *modules-rsi
      state: storage
  - type: Storage
    maxItemSize: Normal

- type: entity
  parent: BaseStorageSuitModule
  id: StorageLargeSuitModule
  name: large storage suit module
  description: "Reverse engineered by Nakamura Engineering from Donk Corporation designs, this system of hidden compartments is entirely within the suit, distributing items and weight evenly to ensure a comfortable experience for the user; whether smuggling, or simply hauling."
  components:
  - type: Sprite
    state: storage_large
  - type: ModularSuitModule
    verbIcon:
      sprite: *modules-rsi
      state: storage_large
  - type: Storage
    grid:
    - 0,0,7,4

- type: entity
  parent: BaseStorageSuitModule
  id: StorageSyndicateSuitModule
  name: storage suit module
  description: "A storage system using nanotechnology developed by Cybersun Industries, these compartments use esoteric technology to compress the physical matter of items put inside of them, essentially shrinking items for much easier and more portable storage."
  components:
  - type: Sprite
    state: storage_syndi
  - type: ModularSuitModule
    modulePrefix: 'C'
    verbIcon:
      sprite: *modules-rsi
      state: storage_syndi
  - type: Storage
    grid:
    - 0,0,8,4

- type: entity
  parent: BaseStorageSuitModule
  id: StorageHoldingSuitModule
  name: bluespace storage suit module
  description: "A storage system developed by Nanotrasen, these compartments employ miniaturized bluespace pockets for the ultimate in storage technology; regardless of the weight of objects put inside."
  components:
  - type: Sprite
    state: storage_holding
  - type: ModularSuitModule
    verbIcon:
      sprite: *modules-rsi
      state: storage_holding
  - type: Storage
    grid:
    - 0,0,19,9

# Flashlight
- type: entity
  parent: BaseSuitModule
  id: BaseFlashlightSuitModule
  abstract: true
  components:
  - type: Sprite
    state: flashlight
  - type: UserInterface
    interfaces:
      enum.LightModuleUiKey.Key:
        type: LightModuleBoundUserInterface
  - type: ModularSuitActionModule
    action: ToggleLightModuleAction
  - type: ModularSuitLightModule
    guaranteedRemoved:
    - type: RgbLightController
  - type: ModularSuitModule
    tags: [ FlashlightSuitModule ]
    modulePart: Helmet
    powerUsage: 0.005
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: flashlight
  - type: Tag
    tags:
    - FlashlightSuitModule

- type: entity
  parent: BaseFlashlightSuitModule
  id: BaseAdvancedFlashlightSuitModule
  abstract: true
  components:
  - type: ModularSuitLightModule
    lightEnergy: 3
    lightRadius: 6

- type: entity
  parent: BaseFlashlightSuitModule
  id: FlashlightSuitModule
  name: flashlight suit module
  description: "A simple pair of flashlights installed on the left and right sides of the helmet, useful for providing light in a variety of ranges and colors. Some survivalists prefer the color green for their illumination, for reasons unknown."

- type: entity
  parent: BaseAdvancedFlashlightSuitModule
  id: AdvancedFlashlightSuitModule
  name: advanced flashlight suit module
  description: "An advanced illumination system with adjustable brightness and a wide spectrum of colors. Includes ambient light sensors for automatic adjustment, as well as an emergency signaling mode. Perfect for exploring dark corridors, maintenance tunnels, and emergency situations. The light color can be customized to any preference."

- type: entity
  parent: FlashlightSuitModule
  id: FlashlightSuitModuleCyan
  categories: [ HideSpawnMenu ]
  components:
  - type: ModularSuitLightModule
    lightColor: "#79f8e6"

