- type: entity
  parent: BaseSuitModule
  id: EnergyShieldSuitModule
  name: energy shield suit module
  description: "A personal, protective forcefield typically seen in military applications. This advanced deflector shield is essentially a scaled down version of those seen on starships, and the power cost can be an easy indicator of this. However, it is capable of blocking nearly any incoming attack, though with its' low amount of separate charges, the user remains mortal."
