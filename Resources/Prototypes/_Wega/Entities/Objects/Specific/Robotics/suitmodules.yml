- type: entity
  parent: BaseSuitModule
  id: OreBagSuitModule
  name: ore suit module
  description: "An integrated ore storage system installed into the suit, this utilizes precise electromagnets and storage compartments to automatically collect and deposit ore. It's recommended by Nakamura Engineering to actually deposit that ore at local refineries."
  components:
  - type: Sprite
    state: ore
  - type: ModularSuitItemModule
    handId: orebag-hand
    item: BorgOreBag
  - type: ModularSuitModule
    modulePart: Gloves
    verbIcon:
      sprite: *modules-rsi
      state: ore

- type: entity
  parent: BaseSuitModule
  id: MicrowaveBeamSuitModule
  name: microwave beam suit module
  description: "An oddly domestic device, this module is installed into the user's palm, hooking up with culinary scanners located in the helmet to blast food with precise microwave radiation, allowing them to cook food from a distance, with the greatest of ease. Not recommended for use against grapes."
  components:
  - type: Sprite
    state: microwave_beam
  - type: ModularSuitItemModule
    handId: microwave-hand
    item: ModularSuitMicrowaveBeam
  - type: ModularSuitModule
    modulePart: Gloves
    powerInstanceUsage: 10
    verbIcon:
      sprite: *modules-rsi
      state: microwave_beam

- type: entity
  parent: BaseItem
  id: ModularSuitMicrowaveBeam
  name: microwave
  description: "A compact microwave emitter mounted on the palm of the suit. Uses precise radiation to cook food from a distance. Perfect for the chef who never wants to leave their post. Or the one who wants to annoy the chef from across the kitchen."
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: *modules-rsi
    state: microwave_beam
  - type: ModularSuitMicrowaveModule

- type: entity
  parent: BaseSuitModule
  id: KinesisSuitModule
  name: kinesis suit module
  description: "A modular plug-in to the forearm, this module was presumed lost for many years, despite the suits it used to be mounted on still seeing some circulation. This piece of technology allows the user to generate precise anti-gravity fields, letting them move objects as small as a titanium rod to as large as industrial machinery. Oddly enough, it doesn't seem to work on living creatures."
  components:
  - type: Sprite
    state: kinesis
  - type: ModularSuitItemModule
    handId: kinesis-hand
    item: KinesisSuitModuleHand
  - type: ModularSuitModule
    modulePart: Gloves
    powerUsage: 0.7
    verbIcon:
      sprite: *modules-rsi
      state: kinesis

- type: entity
  parent: BaseItem
  id: KinesisSuitModuleHand
  name: kinesis
  description: "A precision gravity-manipulation device integrated into the suit's forearm. Generates focused anti-gravity fields to move objects at a distance. Banned in several systems for being 'too convenient'."
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: *modules-rsi
    state: kinesis-core
  - type: ForceGun
    frequency: 15
    dampingRatio: 4
    massLimit: 50
    lineColor: "#18a2d5"
    soundLaunch:
      path: /Audio/Weapons/soup.ogg
      params:
         volume: 2

- type: entity
  parent: BaseSuitModule
  id: ApparatusSuitModule
  name: apparatus suit module
  description: "A favorite by Miners, this modification to the helmet utilizes a nanotechnology barrier in front of the mouth to allow eating and drinking while retaining protection and atmosphere. However, it will do nothing to improve the taste of a goliath steak."
  components:
  - type: Sprite
    state: apparatus
  - type: ModularSuitModuleEffect
    targetSlot: head
    activeComponents:
    - type: IngestionBlocker
      enabled: false
    returnedComponents:
    - type: IngestionBlocker
      enabled: true
  - type: ModularSuitModule
    modulePart: Helmet
    powerUsage: 0
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: apparatus

- type: entity
  parent: BaseSuitModule
  id: PaperDispenserSuitModule
  name: paper dispenser suit module
  description: "A compact paper synthesizer utilizing the same advanced fax and printer technology found in Nanotrasen offices. Converts electrical energy into high-quality paper stock, ensuring you never run out of forms, manifests, or note-taking materials. Popular among cargo technicians and bureaucrats alike."
  components:
  - type: Sprite
    state: paper_maker
  - type: ModularSuitActionModule
    action: ActivatePaperDispenserModuleAction
  - type: ModularSuitModule
    modulePart: Gloves
    powerInstanceUsage: 10
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: paper_maker

