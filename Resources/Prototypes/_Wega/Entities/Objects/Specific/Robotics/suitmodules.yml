    state: armor_booster
  - type: ModularSuitModuleEffect
    targetSlot: outerClothing
    activeComponents:
    - type: AffectedModuleArmorBooster
      modifiers:
        coefficients:
          Blunt: 0.8
          Slash: 0.8
          Piercing: 0.8
          Heat: 0.8
          Shock: 0.8
          Caustic: 0.8
  - type: ModularSuitModule
    tags: [ ArmorBoosterSuitModule, CompressionModuleConflict ]
