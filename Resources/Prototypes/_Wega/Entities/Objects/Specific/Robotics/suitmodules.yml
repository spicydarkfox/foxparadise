- type: entity
  parent: BaseSuitModule
  id: ArmorBossterSuitModule
  name: armor booster suit module
  description: "A retrofitted series of retractable armor plates, allowing the suit to function as essentially power armor, giving the user incredible protection against conventional firearms, or everyday attacks in close-quarters. However, the additional plating cannot deploy alongside parts of the suit used for vacuum sealing, so this extra armor provides zero ability for extravehicular activity while deployed."
