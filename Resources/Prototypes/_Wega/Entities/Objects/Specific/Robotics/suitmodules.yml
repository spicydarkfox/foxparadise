- type: entity
  parent: EMPShieldSuitModule
  id: EMPShieldAdvancedSuitModule
  name: advanced empshield suit module
  description: "A next-generation field inhibitor that completely negates electromagnetic interference without any power draw. How it works is a trade secret of Cybersun Industries."
  components:
  - type: ModularSuitModule
    modulePrefix: 'C'
    powerUsage: 0

- type: entity
  parent: BaseSuitModule
  id: NoSlipSuitModule
  name: noslip suit module
  description: "A classified Cybersun Industries prototype, reverse-engineered from salvaged Syndicate equipment. These advanced piezoelectric stabilizers provide perfect traction on any surface without the power drain or magnetic signature of standard magboots. Originally designed for covert operatives who need to move silently through any environment without leaving traces. Nanotrasen has declared these modules contraband, but they remain a favorite among those who work against the corporation's interests. Honk Co. has filed numerous protests regarding the legality of these modules, citing unfair competitive advantage in the slip-prevention market."
  components:
  - type: Sprite
    state: noslip
  - type: ModularSuitModuleEffect
    targetSlot: shoes
    activeComponents:
    - type: NoSlip
  - type: ModularSuitModule
    tags: [ NoSlipModuleConflict ]
    modulePart: Boots
    modulePrefix: 'C'
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: noslip

- type: entity
  parent: BaseSuitModule
  id: BurgerDispenserSuitModule
  name: burger dispenser suit module
  description: "A rare piece of technology reverse-engineered from a prototype found in a Donk Corporation vessel. This can draw incredible amounts of power from the suit's cell to create edible organic matter in the palm of the wearer's glove; however, research seemed to have entirely stopped at burgers. Notably, all attempts to get it to dispense Earl Grey tea have failed."
  components:
  - type: Sprite
    state: dispenser
  - type: ModularSuitActionModule
    action: ActivateBurgerDispenserModuleAction
  - type: ModularSuitModule
    modulePart: Gloves
    powerInstanceUsage: 10
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: dispenser

- type: entity
  parent: JetpackSuitModule
  id: JetpackAdvancedSuitModule
  name: advanced jetpack suit module
  description: "A high-performance ion propulsion system favored by Nanotrasen security forces. Features enhanced thrust output and improved fuel efficiency compared to the standard model. Perfect for pursuit operations or rapid emergency response."
  components:
  - type: Sprite
    state: jetpack_advanced
  - type: ModularSuitItemModule
    item: JetpackSecurityModule
  - type: ModularSuitModule
    powerUsage: 3
    verbIcon:
      sprite: *modules-rsi
      state: jetpack_advanced

- type: entity
  parent: MagnetSuitModule
  id: MagnetAdvancedSuitModule
  name: advanced magnet suit module
  description: "A sophisticated upgrade to Nakamura Engineering's magnetic stability system, featuring computerized auto-toggling and enhanced grip calibration. Unlike the basic model, these electromagnets intelligently adjust their field strength based on surface conditions and user intent, eliminating the 'stickiness' reported with older versions. Includes a neural-link interface that intuitively engages magnetic grip only when needed, allowing for seamless movement transitions. Originally developed for the Chief Engineer's advanced suit, this module has since been made available to engineering personnel who demand the best in mobility control."
  components:
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: NoSlip
    - type: Magboots
      disabledAutoMode: true
      disabledAutoOff: true
  - type: ModularSuitModule
    powerUsage: 0
