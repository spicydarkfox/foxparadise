  id: SpringlockSuitModule
  name: springlock suit module
  description: "A module that spans the entire size of the MOD unit, sitting under the outer shell. This mechanical exoskeleton pushes out of the way when the user enters and it helps in booting up, but was taken out of modern suits because of the springlock's tendency to 'snap' back into place when exposed to humidity. You know what it's like to have an entire exoskeleton enter you?"
  components:
  - type: Sprite
    state: springlock
  - type: ModularSuitSpringlockModule
