# Visor
- type: entity
  parent: BaseSuitModule
  id: BaseVisorSuitModule
  abstract: true
  components:
  - type: ModularSuitModuleEffect
    targetSlot: head
  - type: ModularSuitModule
    tags: [ VisorSuitModule ]
    modulePart: Helmet
    powerUsage: 0.3
  - type: Tag
    tags:
    - VisorSuitModule

- type: entity
  parent: BaseVisorSuitModule
  id: VisorMedicalSuitModule
  name: medical visor suit module
  description: "A heads-up display installed into the visor of the suit. This cross-references suit sensor data with a modern biological scanning suite, allowing the user to visualize the current health of organic lifeforms, as well as access data such as patient files in a convenient readout. They say these also let you see behind you."
  components:
  - type: Sprite
    state: medhud_visor
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: ShowHealthBars
    - type: ShowHealthIcons
  - type: ModularSuitModule
    verbIcon:
      sprite: *modules-rsi
      state: medhud_visor

- type: entity
  parent: BaseVisorSuitModule
  id: VisorDiagnosticSuitModule
  name: diagnostic visor suit module
  description: "A heads-up display installed into the visor of the suit. This uses a series of advanced sensors to access data from advanced machinery, exosuits, and other devices, allowing the user to visualize current power levels and integrity of such. They say these also let you see behind you."
  components:
  - type: Sprite
    state: diaghud_visor
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: ShowHealthBars
      damageContainers:
      - Inorganic
      - Silicon
  - type: ModularSuitModule
    verbIcon:
      sprite: *modules-rsi
      state: diaghud_visor

- type: entity
  parent: BaseVisorSuitModule
  id: VisorSecuritySuitModule
  name: security visor suit module
  description: "A heads-up display installed into the visor of the suit. This module is a heavily-retrofitted targeting system, plugged into various criminal databases to be able to view arrest records, command simple security-oriented robots, and generally know who to shoot. They say these also let you see behind you."
  components:
  - type: Sprite
    state: sechud_visor
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: ShowJobIcons
    - type: ShowSquadIcons
    - type: ShowMindShieldIcons
    - type: ShowCriminalRecordIcons
    - type: ShowContrabandDetails
  - type: ModularSuitModule
    verbIcon:
      sprite: *modules-rsi
      state: sechud_visor

- type: entity
  parent: BaseVisorSuitModule
  id: VisorMesonSuitModule
  name: meson visor suit module
  description: "A heads-up display installed into the visor of the suit. This module is based off well-loved meson scanner technology, used by construction workers and miners across the galaxy to see basic structural and terrain layouts through walls, regardless of lighting conditions. They say these also let you see behind you."
  components:
  - type: Sprite
    state: meson_visor
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: EyeProtection
  - type: ModularSuitModule
    tags: [ VisorSuitModule, WeldingModuleConflict ]
    verbIcon:
      sprite: *modules-rsi
      state: meson_visor
  - type: Tag
    tags:
    - VisorSuitModule
    - WeldingModuleConflict

- type: entity
  parent: BaseVisorSuitModule
  id: SolutionScannerSuitModule
  name: solution scanner suit module
  description: "A module based off research-oriented Nanotrasen HUDs, this is capable of scanning the contents of containers and projecting the information in an easy-to-read format on the wearer's display. It cannot detect flavors, so that's up to you."
  components:
  - type: Sprite
    state: scanner
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: SolutionScanner
  - type: ModularSuitModule
    powerUsage: 0.2
    verbIcon:
      sprite: *modules-rsi
      state: scanner

# Core
- type: entity
  parent: BaseSuitModule
  id: AntiGravitySuitModule
  name: antigravity suit module
  description: "A module that uses a gravitational core to make the user completely weightless."
  components:
  - type: Sprite
    state: antigrav
  - type: RadiationBlockingContainer
    resistance: 5
  - type: ModularSuitModuleContainerRequirement
    failureMessage: modsuit-module-requires-gravity-core
    requiredContainerId: module_core
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: AntiGravityClothing
  - type: ModularSuitModule
    powerUsage: 0.45
    verbIcon:
      sprite: *modules-rsi
      state: antigrav
  - type: ContainerContainer
    containers:
      module_core: !type:ContainerSlot { }
  - type: ItemSlots
    slots:
      module_core:
        name: module-core-slot-name-default
        whitelist:
          tags:
          - GravityCore
  - type: ItemMapper
    mapLayers:
      antigrav_core:
        whitelist:
          tags:
          - GravityCore
  - type: Appearance

- type: entity
  parent: BaseSuitModule
  id: TeleporterSuitModule
  name: teleporter suit module
  description: "A module that uses a bluespace core to let the user transport their particles elsewhere."
  components:
  - type: Sprite
    state: teleporter
  - type: ModularSuitActionModule
    action: ActivateTeleporterModuleAction
  - type: ModularSuitModuleContainerRequirement
    failureMessage: modsuit-module-requires-bluespace-core
    requiredContainerId: module_core
  - type: ModularSuitModule
    powerInstanceUsage: 25
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: teleporter
  - type: ContainerContainer
    containers:
      module_core: !type:ContainerSlot { }
  - type: ItemSlots
    slots:
      module_core:
        name: module-core-slot-name-default
        whitelist:
          tags:
          - BluespaceCore
  - type: ItemMapper
    mapLayers:
      teleporter_core:
        whitelist:
          tags:
          - BluespaceCore
  - type: Appearance

# Printed
- type: entity
  parent: BaseSuitModule
  id: WeldingSuitModule
  name: welding suit module
  description: "A module installed into the visor of the suit, this projects a polarized, holographic overlay in front of the user's eyes. It's rated high enough for immunity against extremities such as spot and arc welding, solar eclipses, and handheld flashlights."
  components:
  - type: Sprite
    state: welding
  - type: ModularSuitModuleEffect
    targetSlot: head
    activeComponents:
    - type: FlashImmunity
    - type: EyeProtection
  - type: ModularSuitModule
    tags: [ WeldingModuleConflict ]
    modulePart: Helmet
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: welding
  - type: Tag
    tags:
    - WeldingModuleConflict

- type: entity
  parent: BaseSuitModule
  id: TRaySuitModule
  name: tray suit module
  description: "A module installed into the visor of the suit, allowing the user to use a pulse of terahertz radiation to essentially echolocate things beneath the floor, mostly cables and pipes. A staple of atmospherics work, and counter-smuggling work."
  components:
  - type: Sprite
    state: tray
  - type: ModularSuitItemModule
    handId: tray-hand
    item: trayScanner
  - type: ModularSuitModule
    modulePart: Gloves
    powerUsage: 0.15
    verbIcon:
      sprite: *modules-rsi
      state: tray

- type: entity
  parent: BaseSuitModule
  id: HealthAnalyzerSuitModule
  name: health analyzer suit module
  description: "A module installed into the glove of the suit. This is a high-tech biological scanning suite, allowing the user in-depth information on the vitals and injuries of others even at a distance, all with the flick of the wrist. Data is displayed in a convenient package on HUD in the helmet, but it's up to you to do something with it."
  components:
  - type: Sprite
    state: health
  - type: ModularSuitItemModule
    handId: health-analyzer-hand
    item: HandheldHealthAnalyzer
  - type: ModularSuitModule
    modulePart: Gloves
    powerUsage: 0.75
    verbIcon:
      sprite: *modules-rsi
      state: health

- type: entity
  parent: BaseSuitModule
  id: DefibrillatorSuitModule
  name: defibrillator suit module
  description: "A module installed into the glove of the suit, this compact defibrillator can deliver a life-saving shock to a patient in cardiac arrest. Nanotrasen recommends not using it as a weapon, but they can't stop you."
  components:
  - type: Sprite
    state: defibrillator
  - type: ModularSuitItemModule
    handId: defibrillator-hand
    item: DefibrillatorOneHandedUnpowered
  - type: ModularSuitModule
    modulePart: Gloves
    powerUsage: 2
    verbIcon:
      sprite: *modules-rsi
      state: defibrillator

- type: entity
  parent: BaseSuitModule
  id: JetpackSuitModule
  name: jetpack suit module
  description: "A series of electric thrusters installed across the suit, this is a module highly anticipated by trainee Engineers. Rather than using gasses for combustion thrust, these jets are capable of accelerating ions using charge from the suit's cell. Some say this isn't Nakamura Engineering's first foray into jet-enabled suits."
  components:
  - type: Sprite
    state: jetpack
  - type: ModularSuitItemModule
    handId: jetpack-hand
    item: JetpackBlueModule
  - type: ModularSuitModule
    tags: [ JetpackSuitModule ]
    modulePart: Torso
    powerUsage: 1.25
    verbIcon:
      sprite: *modules-rsi
      state: jetpack
  - type: Tag
    tags:
    - JetpackSuitModule

- type: entity
  parent: BaseSuitModule
  id: MagnetSuitModule
  name: magnet suit module
  description: "These are powerful electromagnets fitted into the suit's boots, allowing users both excellent traction no matter the condition indoors, and to essentially hitch a ride on the exterior of a hull. However, these basic models do not feature computerized systems to automatically toggle them on and off, so numerous users report a certain stickiness to their steps."
  components:
  - type: Sprite
    state: magnet
  - type: ModularSuitModuleEffect
    targetSlot: shoes
    activeComponents:
    - type: NoSlip
    - type: Magboots
      disabledAutoMode: true
      disabledAutoOff: true
    - type: ClothingSpeedModifier
      walkModifier: 0.8
      sprintModifier: 0.8
  - type: ModularSuitModule
    tags: [ MagneticSuitModule, NoSlipModuleConflict ]
    modulePart: Boots
    powerUsage: 0.4
    verbIcon:
      sprite: *modules-rsi
      state: magnet
  - type: Tag
    tags:
    - MagneticSuitModule

- type: entity
  parent: BaseSuitModule
  id: HolsterSuitModule
  name: holster suit module
  description: "Based off typical storage compartments, this system allows the suit to holster a standard firearm across its surface and allow for extremely quick retrieval. While some users prefer the chest, others the forearm for quick deployment, some law enforcement prefer the holster to extend from the thigh."
  components:
  - type: Sprite
    state: holster
  - type: ModularSuitActionModule
    action: ToggleHolsterModuleAction
  - type: ModularSuitModule
    modulePart: Torso
    powerInstanceUsage: 2.5
    canBeDisabled: false
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: holster
  - type: ContainerContainer
    containers:
      module_weapon: !type:ContainerSlot { }
  - type: ItemSlots
    slots:
      module_weapon:
        name: module-weapon-slot-name-default
        whitelist:
          components:
          - BallisticAmmoProvider
          - ChamberMagazineAmmoProvider

- type: entity
  parent: BaseSuitModule
  id: TetherSuitModule
  name: tether suit module
  description: "A custom-built grappling-hook powered by a winch capable of hauling the user. While some older models of cargo-oriented grapples have capacities of a few tons, these are only capable of working in zero-gravity environments, a blessing to some Engineers."
  components:
  - type: Sprite
    state: tether
  - type: ModularSuitItemModule
    handId: grapling-hand
    item: WeaponGrapplingGun
  - type: ModularSuitModule
    powerUsage: 0.15
    verbIcon:
      sprite: *modules-rsi
      state: tether

- type: entity
  parent: BaseSuitModule
  id: EMPShieldSuitModule
  name: empshield suit module
  description: "A field inhibitor installed into the suit, protecting it against feedback such as electromagnetic pulses that would otherwise damage the electronic systems of the suit or devices on the wearer. However, it will take from the suit's power to do so. Luckily, your PDA already has one of these."
  components:
  - type: Sprite
    state: empshield
  - type: ModularSuitModuleWearerEffect
    activeComponents:
    - type: EmpResistance
      strengthMultiplier: 0
  - type: ModularSuitModuleEffect
    activeComponents:
    - type: EmpResistance
      strengthMultiplier: 0
  - type: ModularSuitModule
    tags: [ EMPShieldSuitModule ]
    modulePart: Torso
    powerUsage: 0.3
    verbIcon:
      sprite: *modules-rsi
      state: empshield

- type: entity
  parent: BaseSuitModule
  id: TemperatureRegulatorSuitModule
  name: temperature regulator suit module
  description: "Advanced climate control, using an inner body glove interwoven with thousands of tiny, flexible cooling lines. This circulates coolant at various user-controlled temperatures, ensuring maximum comfort even for those who like it hot. Once installed, this module becomes an integral part of the suit and cannot be removed. Incompatible with certain MODsuit models."
  components:
  - type: Sprite
    state: regulator
  - type: ModularSuitPermanentInstalled
  - type: ModularSuitModuleEffect
    targetSlot: outerClothing
    activeComponents:
    - type: TemperatureProtection
      heatingCoefficient: 0.001
      coolingCoefficient: 0.001
  - type: ModularSuitModule
    modulePart: Torso
    canBeDisabled: false
    powerUsage: 0.15
    active: true
    verbIcon:
      sprite: *modules-rsi
      state: regulator
  - type: Tag
    tags:
    - TemperatureRegulatorModuleConflict

- type: entity
  parent: BaseSuitModule
  id: GPSSuitModule
  name: gps suit module
  description: "This module uses common Nanotrasen technology to calculate the user's position anywhere in space, down to the exact coordinates. This information is fed to a central database viewable from the device itself, though using it to help people is up to you."
  components:
  - type: Sprite
    state: gps
  - type: ModularSuitItemModule
    handId: gps-hand
    item: BorgHandheldGPSBasic
  - type: ModularSuitModule
    verbIcon:
      sprite: *modules-rsi
      state: gps

- type: entity
  parent: BaseSuitModule
  id: ConstructorSuitModule
  name: constructor suit module
  description: "This module entirely occupies the wearer's forearm, notably causing conflict with advanced arm servos meant to carry crewmembers. However, it functions as an extremely advanced construction hologram scanner, as well as containing the latest engineering schematics combined with inbuilt memory to help the user build structures."
  components:
  - type: Sprite
    state: constructor
  - type: ModularSuitItemModule
    handId: rcd-hand
    item: RCDRecharging
  - type: ModularSuitModule
    tags: [ CarryConstructorModuleConflict ]
    modulePart: Gloves
    powerUsage: 1
    verbIcon:
      sprite: *modules-rsi
      state: constructor
  - type: Tag
    tags:
    - CarryConstructorModuleConflict

- type: entity
  parent: BaseSuitModule
  id: QuickCarrySuitModule
  name: quick carry suit module
  description: "A suite of advanced servos, redirecting power from the suit's arms to help carry the wounded; or simply for fun. However, Nanotrasen has locked the module's ability to assist in hand-to-hand combat."
  components:
  - type: Sprite
    state: carry
  - type: ModularSuitModuleWearerEffect
    activeComponents:
    - type: AffectedModuleCarry
  - type: ModularSuitModule
    tags: [ CarryConstructorModuleConflict ]
    modulePart: Gloves
    powerUsage: 0.3
    verbIcon:
      sprite: *modules-rsi
      state: carry
  - type: Tag
    tags:
    - CarryConstructorModuleConflict

- type: entity
  parent: BaseSuitModule
  id: GrabberSuitModule
  name: grabber module
  description: "A series of actuators installed into both arms of the suit, boasting a lifting capacity of almost a ton. However, this design has been locked by Nanotrasen to be primarily utilized for lifting various crates. A lot of people would say that loading cargo is a dull job, but you could not disagree more."
  components:
  - type: Sprite
    state: clamp
  - type: ModularSuitGrabberModule
  - type: ModularSuitItemModule
    handId: grabber-hand
    item: ModularSuitGrabberTool
  - type: ModularSuitModule
    modulePart: Gloves
    powerInstanceUsage: 10
    verbIcon:
      sprite: *modules-rsi
      state: clamp

- type: entity
  parent: BaseItem
  id: ModularSuitGrabberTool
  name: manipulator
  description: "A heavy-duty hydraulic manipulator that extends from the suit's arm. Capable of lifting and moving cargo crates with ease. Nanotrasen recommends keeping both hands on the crate at all times, but who has time for that?"
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: *modules-rsi
    state: clamp
  - type: ModularSuitGrabberTool

- type: entity
  parent: BaseSuitModule
  id: DrillSuitModule
  name: drill module
  description: "An integrated drill, typically extending over the user's hand. While useful for drilling through rock, your drill is surely the one that both pierces and creates the heavens."
  components:
  - type: Sprite
    state: drill
  - type: ModularSuitItemModule
    handId: drill-hand
    item: MiningDrill
  - type: ModularSuitModule
    modulePart: Gloves
    powerUsage: 0.5
    verbIcon:
      sprite: *modules-rsi
      state: drill

- type: entity
  parent: BaseSuitModule
  id: InjectorSuitModule
  name: injector suit module
  description: "A module installed into the wrist of the suit, this functions as a high-capacity syringe, with a tip fine enough to locate the emergency injection ports on any suit of armor, penetrating it with ease. Even yours."
  components:
  - type: Sprite
    state: injector
  - type: ModularSuitItemModule
    handId: injector-hand
    item: AdvancedJetInjector
  - type: ModularSuitModule
    modulePart: Gloves
    powerUsage: 0.3
    verbIcon:
      sprite: *modules-rsi
      state: injector

- type: entity
  parent: BaseSuitModule
  id: BikeHornSuitModule
  name: bike horn suit module
  description: "A shoulder-mounted piece of heavy sonic artillery, this module uses the finest femto-manipulator technology to precisely deliver an almost lethal squeeze to... a bike horn, producing a significantly memorable sound."
  components:
  - type: Sprite
